# CI build for both architectures, on GitHub's ARM64 Windows runner.
#
# Produces the same four artifacts as a local release build:
#   openwritr-windows-arm64-v{V}.zip / -setup.exe   (Snapdragon, NPU)
#   openwritr-windows-x64-v{V}.zip   / -setup.exe   (Intel/AMD, CPU)
#
# This pipeline is also the prerequisite for SignPath Foundation OSS code
# signing: SignPath only signs artifacts produced by an auditable CI build.
# Once the SignPath application is approved, a signing step slots in after
# `Build installers` (see the placeholder comment below).

name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # release uploads on tag builds

jobs:
  build:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Add x86_64 Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Set up Python (ARM64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch QNN runtime DLLs (arm64 package source)
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --quiet onnxruntime-qnn

      - name: Fetch x64 CPU onnxruntime.dll
        run: python scripts/fetch_x64_ort.py

      - name: Build (arm64)
        run: cargo build --release --bin openwritr

      - name: Build (x64 cross)
        run: cargo build --release --target x86_64-pc-windows-msvc --bin openwritr

      - name: Package zips
        run: |
          cargo run --release --bin package
          cargo run --release --bin package -- --arch x64

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installers
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /Qp installer\openwritr.iss
          & $iscc /Qp installer\openwritr-x64.iss

      # --- SignPath signing step goes here once the OSS application is
      # --- approved: upload unsigned installers as artifacts, submit a
      # --- signing request via SignPath/github-action-submit-signing-request,
      # --- download the signed results, then continue with checksums.

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          cd target/dist
          $files = Get-ChildItem openwritr-windows-* | Where-Object { $_.Extension -in ".exe",".zip" }
          $lines = foreach ($f in $files) { "{0}  {1}" -f (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower(), $f.Name }
          $lines | Set-Content SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwritr-dist
          path: |
            target/dist/openwritr-windows-*.zip
            target/dist/openwritr-windows-*-setup.exe
            target/dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Attach to release (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dist/openwritr-windows-*.zip
            target/dist/openwritr-windows-*-setup.exe
            target/dist/SHA256SUMS.txt
