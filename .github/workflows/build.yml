name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Add x86_64 Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run unit tests
        shell: pwsh
        run: |
          . .\scripts\envup.ps1 -Arch arm64
          cargo test --all-targets --no-fail-fast

      - name: Build release binaries
        shell: pwsh
        run: |
          . .\scripts\envup.ps1 -Arch arm64
          cargo build --release --bins
          . .\scripts\envup.ps1 -Arch x64
          cargo build --release --target x86_64-pc-windows-msvc --bin openwritr

      # Runtime files are staged after Cargo finishes so Cargo's target
      # directory cleanup cannot remove non-Cargo DLLs.
      - name: Fetch pinned runtime files
        run: |
          python scripts/fetch_runtime.py --arch arm64
          python scripts/fetch_runtime.py --arch x64

      - name: Prepare and verify release stages
        run: |
          python scripts/prepare_release.py --arch arm64
          python scripts/prepare_release.py --arch x64
          python scripts/verify_artifact.py --arch arm64 --artifact target/stage/arm64 --format directory
          python scripts/verify_artifact.py --arch x64 --artifact target/stage/x64 --format directory

      - name: Run staged self-checks
        shell: pwsh
        run: |
          $arm = Start-Process target\stage\arm64\openwritr.exe -ArgumentList "--self-check" -NoNewWindow -Wait -PassThru
          if ($arm.ExitCode -ne 0) { throw "ARM64 self-check failed" }
          $x64 = Start-Process target\stage\x64\openwritr.exe -ArgumentList "--self-check" -NoNewWindow -Wait -PassThru
          if ($x64.ExitCode -ne 0) { throw "x64 self-check failed" }

      - name: Package and verify ZIP files
        shell: pwsh
        run: |
          & target\release\package.exe
          if ($LASTEXITCODE -ne 0) { throw "ARM64 ZIP packaging failed" }
          & target\release\package.exe --arch x64
          if ($LASTEXITCODE -ne 0) { throw "x64 ZIP packaging failed" }

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installers
        shell: pwsh
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = $metadata.packages[0].version
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /Qp "/DAppVersion=$version" installer\openwritr.iss
          if ($LASTEXITCODE -ne 0) { throw "ARM64 installer build failed" }
          & $iscc /Qp "/DAppVersion=$version" installer\openwritr-x64.iss
          if ($LASTEXITCODE -ne 0) { throw "x64 installer build failed" }

      - name: Build and verify MSIX packages
        if: ${{ !startsWith(github.ref, 'refs/tags/v') || (vars.MSIX_IDENTITY_NAME != '' && vars.MSIX_PUBLISHER != '') }}
        shell: pwsh
        env:
          MSIX_IDENTITY_NAME: ${{ vars.MSIX_IDENTITY_NAME }}
          MSIX_PUBLISHER: ${{ vars.MSIX_PUBLISHER }}
          IS_TAGGED_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $version = "$($metadata.packages[0].version).0"
          if ($env:IS_TAGGED_RELEASE -eq "true") {
            .\scripts\build_msix.ps1 -Version $version `
              -IdentityName $env:MSIX_IDENTITY_NAME `
              -Publisher $env:MSIX_PUBLISHER `
              -RequireStoreIdentity
          } else {
            .\scripts\build_msix.ps1 -Version $version
          }
          python scripts\verify_artifact.py --arch arm64 --artifact "target\dist\openwritr-arm64-$version.msix" --format msix
          python scripts\verify_artifact.py --arch x64 --artifact "target\dist\openwritr-x64-$version.msix" --format msix

      - name: Report skipped Store package
        if: ${{ startsWith(github.ref, 'refs/tags/v') && (vars.MSIX_IDENTITY_NAME == '' || vars.MSIX_PUBLISHER == '') }}
        shell: pwsh
        run: |
          Write-Warning "Skipping the Store bundle because MSIX_IDENTITY_NAME and MSIX_PUBLISHER are not configured."

      # Store packages are signed during Partner Center ingestion. GitHub
      # releases publish only the directly installable ZIP and Inno artifacts.
      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          Set-Location target\dist
          $files = Get-ChildItem openwritr-* -File |
            Where-Object { $_.Extension -in ".exe", ".zip" } |
            Sort-Object Name
          $lines = foreach ($file in $files) {
            "{0}  {1}" -f (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower(), $file.Name
          }
          $lines | Set-Content SHA256SUMS.txt -Encoding ascii
          Get-Content SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwritr-dist
          path: |
            target/dist/openwritr-windows-*.zip
            target/dist/openwritr-windows-*-setup.exe
            target/dist/openwritr-*.msix
            target/dist/openwritr-*.msixbundle
            target/dist/SHA256SUMS.txt
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dist/openwritr-windows-*.zip
            target/dist/openwritr-windows-*-setup.exe
            target/dist/SHA256SUMS.txt
